version: "3"
services:
  elasticsearch:
    # 保持一致的版本
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.2
    container_name: es-container
    environment:
      - node.name=es01
      - cluster.name=es-docker-cluster
      - discovery.type=single-node  # 关键：单节点模式
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"  # 给它分配1G内存，防止OOM
      - xpack.security.enabled=false  # 关键：关闭密码和SSL，允许HTTP连接
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - elastic

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.2
    container_name: kibana-container
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200 # 注意这里是 http
    networks:
      - elastic
    depends_on:
      - elasticsearch

volumes:
  esdata:
    driver: local

networks:
  elastic:
    driver: bridge